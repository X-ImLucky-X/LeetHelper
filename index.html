<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetHelper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navigation & settings">
        <div class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          </div>
          <div>
            <h1>LeetHelper</h1>
            <p>Revise patterns, not tabs.</p>
          </div>
        </div>

        <div class="sidebar-tabs">
          <button id="tabSheets" class="sidebar-tab-btn active" type="button">Sheets</button>
          <button id="tabCompanies" class="sidebar-tab-btn" type="button">Companies</button>
          <button id="tabTest" class="sidebar-tab-btn" type="button">Mock Test</button>
        </div>

        <!-- Sheets Section -->
        <div id="sheetsSection" class="sidebar-section">
          <section class="control-group">
            <h2>Sheets</h2>
            <div id="sheetList" class="sheet-list"></div>
          </section>
        </div>

        <!-- Companies Section -->
        <div id="companiesSection" class="sidebar-section hidden">
          <section class="control-group">
            <h2>Companies</h2>
            <div class="company-search-box">
              <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input id="companySearchInput" type="search" placeholder="Search company..." />
              <div id="companyList" class="company-list"></div>
            </div>
          </section>
        </div>

        <!-- Mock Test Section -->
        <div id="testSection" class="sidebar-section hidden">
          <section class="control-group">
            <h2>Test settings</h2>
            <div class="test-config-form">
              <label class="form-label">
                <span>Question Source</span>
                <select id="testSourceSelect" class="form-select"></select>
              </label>
              
              <label class="form-label">
                <span>Difficulty Mix</span>
                <select id="testMixSelect" class="form-select">
                  <option value="easy-medium">Standard (1 Easy, 1 Medium)</option>
                  <option value="medium-hard">Google Round (1 Medium, 1 Hard)</option>
                  <option value="full">Full Assessment (1 Easy, 2 Med, 1 Hard)</option>
                  <option value="custom">Custom Mix</option>
                </select>
              </label>

              <div id="customMixGroup" class="custom-mix-group hidden">
                <label class="form-label inline">
                  <span>Easy</span>
                  <input id="easyCountInput" type="number" min="0" max="10" value="1" />
                </label>
                <label class="form-label inline">
                  <span>Medium</span>
                  <input id="mediumCountInput" type="number" min="0" max="10" value="1" />
                </label>
                <label class="form-label inline">
                  <span>Hard</span>
                  <input id="hardCountInput" type="number" min="0" max="10" value="1" />
                </label>
              </div>
              
              <label class="form-label">
                <span>Time Limit (minutes)</span>
                <input id="testTimeInput" class="form-input" type="number" min="5" max="180" value="45" />
              </label>
              
              <button id="startTestBtn" class="test-start-btn" type="button">Start Mock Round</button>
            </div>
          </section>
        </div>

        <section class="control-group compact">
          <h2>Preferences</h2>
          <label class="toggle-row">
            <span class="toggle-label">Open optimal first</span>
            <div class="switch">
              <input id="showOptimalFirst" type="checkbox" checked />
              <span class="slider round"></span>
            </div>
          </label>
        </section>
      </aside>

      <main class="main">
        <div class="main-content-wrapper">
          <!-- Standard Mode View -->
          <div id="standardView">
            <header class="toolbar">
              <div>
                <p id="activeSheet" class="eyebrow"></p>
                <h2 id="topicHeading">Pick topics to revise <span id="totalCount" class="total-count-badge">0</span></h2>
              </div>
              <div class="toolbar-actions">
                <div class="search-box">
                  <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                  <input id="searchInput" type="search" placeholder="Search questions, topics..." />
                </div>
              </div>
            </header>

            <section class="filter-dashboard-zone" aria-label="Filters and statistics">
              <div class="difficulty-dashboard">
                <article class="stat-card easy-stats">
                  <span id="easyCount">0</span>
                  <p>Easy</p>
                </article>
                <article class="stat-card medium-stats">
                  <span id="mediumCount">0</span>
                  <p>Medium</p>
                </article>
                <article class="stat-card hard-stats">
                  <span id="hardCount">0</span>
                  <p>Hard</p>
                </article>
              </div>
              <!-- Sheets Topic Filters -->
              <div id="sheetsFilterContainer" class="topics-scroll-container">
                <div id="topicList" class="topic-badge-row"></div>
              </div>

              <!-- Companies Time Filters -->
              <div id="companiesFilterContainer" class="topics-scroll-container hidden">
                <div id="timeFilterList" class="topic-badge-row"></div>
              </div>
            </section>

            <section id="questionGrid" class="question-grid" aria-live="polite"></section>
          </div>

          <!-- Mock Test Mode View -->
          <div id="testView" class="test-view-container hidden">
            <header class="test-toolbar">
              <div>
                <span class="test-eyebrow">Assessment in progress</span>
                <h2 id="testNameLabel">Mock Coding Round</h2>
              </div>
              <div class="test-timer-wrapper">
                <div class="test-timer-card">
                  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                  <span id="testTimerLabel">45:00</span>
                </div>
                <button id="submitTestBtn" class="test-submit-btn" type="button">Submit Test</button>
              </div>
            </header>

            <!-- Results Scorecard Card -->
            <div id="testScorecard" class="test-scorecard-card hidden">
              <div class="scorecard-header">
                <h3>Assessment Performance Card</h3>
                <p id="scorecardSummaryLabel"></p>
              </div>
              <div id="scorecardDetails" class="scorecard-details"></div>
              <div class="scorecard-actions">
                <button id="exitTestBtn" class="test-exit-btn" type="button">Exit Mock Test Mode</button>
              </div>
            </div>

            <section id="testQuestionGrid" class="question-grid"></section>
          </div>
        </div>
      </main>

      <!-- Slide-out Right Drawer for Company Questions Walkthrough -->
      <aside id="rightDrawer" class="right-drawer">
        <div class="drawer-header">
          <h2 id="drawerTitle">Question Details</h2>
          <button id="closeDrawerBtn" class="close-drawer-btn" type="button" aria-label="Close details">&times;</button>
        </div>
        <div id="drawerContent" class="drawer-content"></div>
      </aside>
    </div>

    <template id="questionCardTemplate">
      <article class="question-card collapsed">
        <div class="card-topline">
          <div class="topline-left">
            <span class="difficulty"></span>
            <span class="question-topic-badge"></span>
          </div>
        </div>
        
        <div class="card-main-header">
          <h3 class="question-title-text"></h3>
          <button class="expand-toggle-btn" type="button" aria-label="Expand details">
            <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
        </div>
        
        <p class="question-meta"></p>
        <div class="external-links"></div>

        <!-- Collapsible Detailed Section -->
        <div class="details-collapsible">
          <!-- Detail Badges Row (Exactly like LeetCode) -->
          <div class="detail-badges-row">
            <button class="badge-btn topics-btn" type="button">Topics ▾</button>
          </div>
          
          <div class="panel-container">
            <div class="panel topics-panel hidden"></div>
          </div>

          <!-- Renders the full LeetCode description HTML -->
          <div class="problem-content-html"></div>
          
          <div class="solution-section">
            <h4 class="section-title">Solutions</h4>
            <div class="solution-tabs"></div>
            <div class="solution-panel"></div>
          </div>
        </div>
      </article>
    </template>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
