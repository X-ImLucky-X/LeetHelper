<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetHelper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navigation & settings">
        <div class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          </div>
          <div>
            <h1>LeetHelper</h1>
            <p>Revise patterns, not tabs.</p>
          </div>
        </div>

        <div class="sidebar-tabs">
          <button id="tabSheets" class="sidebar-tab-btn active" type="button">Sheets</button>
          <button id="tabCompanies" class="sidebar-tab-btn" type="button">Companies</button>
        </div>

        <!-- Sheets Section -->
        <div id="sheetsSection" class="sidebar-section">
          <section class="control-group">
            <h2>Sheets</h2>
            <div id="sheetList" class="sheet-list"></div>
          </section>

          <section class="control-group">
            <h2>Topics</h2>
            <div id="topicList" class="topic-list"></div>
          </section>
        </div>

        <!-- Companies Section -->
        <div id="companiesSection" class="sidebar-section hidden">
          <section class="control-group">
            <h2>Companies</h2>
            <div class="company-search-box">
              <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input id="companySearchInput" type="search" placeholder="Search company..." />
            </div>
            <div id="companyList" class="company-list"></div>
          </section>
          
          <section class="control-group">
            <h2>Time Filters</h2>
            <div id="timeFilterList" class="time-filter-list"></div>
          </section>
        </div>

        <section class="control-group compact">
          <h2>Preferences</h2>
          <label class="toggle-row">
            <span class="toggle-label">Open optimal first</span>
            <div class="switch">
              <input id="showOptimalFirst" type="checkbox" checked />
              <span class="slider round"></span>
            </div>
          </label>
        </section>
      </aside>

      <main class="main">
        <div class="main-content-wrapper">
          <header class="toolbar">
            <div>
              <p id="activeSheet" class="eyebrow"></p>
              <h2 id="topicHeading">Pick topics to revise</h2>
            </div>
            <div class="toolbar-actions">
              <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input id="searchInput" type="search" placeholder="Search questions, topics..." />
              </div>
            </div>
          </header>

          <section class="stats-grid" aria-label="Sheet statistics">
            <article class="stat-card total-stats">
              <span id="totalCount">0</span>
              <p>Questions</p>
            </article>
            <article class="stat-card easy-stats">
              <span id="easyCount">0</span>
              <p>Easy</p>
            </article>
            <article class="stat-card medium-stats">
              <span id="mediumCount">0</span>
              <p>Medium</p>
            </article>
            <article class="stat-card hard-stats">
              <span id="hardCount">0</span>
              <p>Hard</p>
            </article>
          </section>

          <section id="questionGrid" class="question-grid" aria-live="polite"></section>
        </div>
      </main>
    </div>

    <template id="questionCardTemplate">
      <article class="question-card collapsed">
        <div class="card-topline">
          <div class="topline-left">
            <span class="difficulty"></span>
            <span class="question-topic-badge"></span>
          </div>
        </div>
        
        <div class="card-main-header">
          <h3 class="question-title-text"></h3>
          <button class="expand-toggle-btn" type="button" aria-label="Expand details">
            <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
        </div>
        
        <p class="question-meta"></p>
        <div class="external-links"></div>

        <!-- Collapsible Detailed Section -->
        <div class="details-collapsible">
          <!-- Detail Badges Row (Exactly like LeetCode) -->
          <div class="detail-badges-row">
            <button class="badge-btn topics-btn" type="button">Topics ▾</button>
            <button class="badge-btn companies-btn" type="button">Company Tags ▾</button>
            <button class="badge-btn hints-btn" type="button">💡 Hints ▾</button>
          </div>
          
          <div class="panel-container">
            <div class="panel topics-panel hidden"></div>
            <div class="panel companies-panel hidden"></div>
            <div class="panel hints-panel hidden"></div>
          </div>

          <!-- Renders the full LeetCode description HTML -->
          <div class="problem-content-html"></div>
          
          <div class="solution-section">
            <h4 class="section-title">Solutions</h4>
            <div class="solution-tabs"></div>
            <div class="solution-panel"></div>
          </div>
        </div>
      </article>
    </template>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
